<html>
  <head>
    <title>Average test marks</title>
    <script>
      function calculateavg() {
        var regno = document.getElementById("regno").value;
        var subcode = document.getElementById("subcode").value;
        var t1 = parseInt(document.getElementById("t1").value);
        var t2 = parseInt(document.getElementById("t2").value);
        var t3 = parseInt(document.getElementById("t3").value);

        var res;
        if (t1 <= t2 && t1 <= t3) res = t2 + t3;
        else if (t2 <= t1 && t2 <= t3) res = t1 + t3;
        else res = t1 + t2;

        var avg = res / 2;

        alert(
          "regno: " +
            regno +
            "\nsubject code: " +
            subcode +
            "\ntest 1 marks: " +
            t1 +
            "\ntest 2 marks: " +
            t2 +
            "\ntest 3 marks: " +
            t3 +
            "\naverage of best 2 tests: " +
            avg,
        );
      }
    </script>
  </head>
  <body>
    <center>
      <h2>average marks</h2>
      <br />
      <form action="#">
        regno:
        <input type="text" id="regno" /> <br /><br />
        subject code:
        <input type="text" id="subcode" /><br /><br />
        test 1:
        <input type="text" id="t1" /> <br /><br />
        test 2:
        <input type="text" id="t2" /> <br /><br />
        test 3:
        <input type="text" id="t3" /> <br /><br />
        <input type="button" value="calculate avg" onclick="calculateavg()" />
      </form>
    </center>
  </body>
</html>
