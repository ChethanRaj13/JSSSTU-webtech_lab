<!DOCTYPE html>
<html>
    <head>
        <title>Student Feedback Form</title>
    </head>
    <body>
        <center>
            <h1>Student Feedback Form</h1>

            <form>
                Name:
                <input type="text" name="name"><br><br>

                USN:
                <input type="text" name="usn"><br><br>

                Gender:
                <input type="radio" name="gender">Male
                <input type="radio" name="gender">Female <br><br>

                Most liked Subject:
                <input type="checkbox" name="ML"> ML
                <input type="checkbox" name="web"> Web
                <input type="checkbox" name="iot"> IOT <br><br>

                Semester:
                <select>
                    <option>1th sem</option>
                    <option>2th sem</option>
                    <option>3th sem</option>
                    <option>4th sem</option>
                    <option selected>5th sem</option>
                    <option>6th sem</option>
                    <option>7th sem</option>
                    <option>8th sem</option>
                </select> <br><br>

                Comment: <br>
                <textarea name="comment" rows="5" cols="30" placeholder="type your feedback"></textarea> <br><br>

                <input type="submit" value="submit">
                <input type="reset" value="reset">
            </form>
        </center>
    </body>
</html>
